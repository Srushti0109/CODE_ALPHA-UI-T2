<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #8b5cf6; /* Vibrant Electric Purple */
            --secondary: #10b981; /* Emerald Green */
            --text-main: #0f172a; /* Slate 900 */
            --text-light: #64748b;
            --bg-bot: #ffffff; /* Solid White */
            --bg-user: #8b5cf6; /* Vibrant Electric Purple */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Animated mesh gradient: Deep Navy to Dark Violet */
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #4c1d95);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            color: var(--text-main);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Main Container */
        .chat-container {
            width: 100%;
            max-width: 420px;
            height: 85vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid #ffffff;
            border-radius: 28px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        .chat-header {
            padding: 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .bot-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-right: 16px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .bot-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Pulsing Live Indicator */
        .status-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background-color: var(--secondary);
            border-radius: 50%;
            border: 2px solid #fff;
        }

        .status-indicator::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 50%;
            background-color: var(--secondary);
            animation: pulse 2s infinite;
            z-index: -1;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            70% { transform: scale(2.5); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        .header-info h2 {
            font-size: 1.15rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            letter-spacing: -0.02em;
        }

        .header-info p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 2px;
            font-weight: 500;
        }

        .chat-window {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-window::-webkit-scrollbar {
            width: 6px;
        }

        .chat-window::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        /* Message Bubbles */
        .message {
            max-width: 82%;
            padding: 14px 18px;
            border-radius: 24px;
            font-size: 0.95rem;
            line-height: 1.5;
            opacity: 0;
            /* Bounce animation on appear */
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            position: relative;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bg-bot);
            color: #000000;
            border-bottom-left-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: none;
        }

        .message.user {
            align-self: flex-end;
            background: var(--bg-user);
            color: #ffffff;
            border-bottom-right-radius: 6px;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
        }

        /* Typing Indicator */
        .typing-indicator {
            align-self: flex-start;
            background: var(--bg-bot);
            padding: 14px 18px;
            border-radius: 24px;
            border-bottom-left-radius: 6px;
            display: none;
            align-items: center;
            gap: 5px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .typing-indicator.active {
            display: flex;
            animation: bounceIn 0.3s ease-out forwards;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-light);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1.1); opacity: 1; }
        }

        /* Input Area */
        .input-area {
            padding: 20px 24px 24px;
            background: rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50px; /* Pill-shaped */
            padding: 8px 8px 8px 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        /* Glowing border on focus */
        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.25), 0 8px 20px rgba(0,0,0,0.15);
            background: #ffffff;
        }

        .chat-input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 1rem;
            color: var(--text-main);
        }

        .chat-input::placeholder {
            color: #94a3b8;
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        /* Scale up on hover */
        .send-btn:hover {
            transform: scale(1.12);
            background: #4f46e5;
            box-shadow: 0 6px 18px rgba(99, 102, 241, 0.5);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn i {
            width: 20px;
            height: 20px;
            margin-left: -2px; /* Visual center adjustment for send icon */
        }
        
        /* Background Glass Orbs for added depth */
        .glass-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 1;
            opacity: 0.5;
        }
        
        .orb-1 {
            width: 350px;
            height: 350px;
            background: #a855f7;
            top: -100px;
            left: -100px;
            animation: float 8s ease-in-out infinite;
        }
        
        .orb-2 {
            width: 300px;
            height: 300px;
            background: #fb923c;
            bottom: -50px;
            right: -50px;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
            100% { transform: translateY(0px) scale(1); }
        }
    </style>
</head>
<body>
    <!-- Decorative background elements -->
    <div class="glass-orb orb-1"></div>
    <div class="glass-orb orb-2"></div>

    <div class="chat-container">
        <!-- Chat Header -->
        <div class="chat-header">
            <div class="bot-avatar">
                <!-- Using a cute 3D robot avatar from Unsplash API for the friendly AI Bot -->
                <img src="https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?auto=format&fit=crop&w=150&q=80" alt="Bot Avatar" />
                <div class="status-indicator"></div>
            </div>
            <div class="header-info">
                <h2>Nova Assistant</h2>
                <p>Online • Ready to help</p>
            </div>
        </div>

        <!-- Chat Window -->
        <div class="chat-window" id="chat-window">
            <div class="message bot">
                Hi there! 👋 I'm Nova, your AI assistant. How can I help you today?
            </div>
            
            <div class="typing-indicator" id="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <!-- Input Bar -->
        <div class="input-area">
            <form id="chat-form" class="input-wrapper">
                <input type="text" id="chat-input" class="chat-input" placeholder="Type your message..." autocomplete="off">
                <button type="submit" class="send-btn" aria-label="Send message">
                    <i data-lucide="send"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Chat Interaction Logic -->
    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatWindow = document.getElementById('chat-window');
        const typingIndicator = document.getElementById('typing-indicator');

        // Sample bot responses to simulate a conversation
        const botResponses = [
            "That's an excellent point! I can certainly assist you with that.",
            "I'm processing your request. Please hold on for a moment.",
            "Based on our FAQ, the best approach would be to check your settings panel.",
            "Could you clarify that a bit more? I want to make sure I give you the perfect answer.",
            "Done! I've updated the system with your information.",
            "I love that! Yes, we fully support that feature.",
            "Is there anything else you need help with today?"
        ];

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;

            // 1. Add user message
            addMessage(message, 'user');
            chatInput.value = '';
            scrollToBottom();

            // 2. Show "Bot is typing..." indicator after a tiny delay
            setTimeout(() => {
                typingIndicator.classList.add('active');
                chatWindow.appendChild(typingIndicator); // Ensure it stays at the very bottom
                scrollToBottom();
                
                // 3. Simulate bot thinking time (random delay between 1-2.5 seconds)
                const delay = Math.floor(Math.random() * 1500) + 1000;
                
                setTimeout(() => {
                    // Hide typing indicator
                    typingIndicator.classList.remove('active');
                    
                    // Add the bot's actual response
                    const randomResponse = botResponses[Math.floor(Math.random() * botResponses.length)];
                    addMessage(randomResponse, 'bot');
                    scrollToBottom();
                }, delay);

            }, 400); 
        });

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            messageDiv.textContent = text;
            
            // Insert the message right before the typing indicator
            chatWindow.insertBefore(messageDiv, typingIndicator);
        }

        function scrollToBottom() {
            // Smoothly scroll to the latest message
            chatWindow.scrollTo({
                top: chatWindow.scrollHeight,
                behavior: 'smooth'
            });
        }
    </script>
</body>
</html>
